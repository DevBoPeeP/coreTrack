server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: notificationservice

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/TmsNotify}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false



    kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      consumer:
        group-id: notification-service-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        properties:
          spring.json.trusted.packages: "com.notificationservice.event"
          spring.json.use.type.headers: false



  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    default-encoding: UTF-8

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    mapper:
      accept-case-insensitive-enums: true


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Firebase
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:my-tms-project-cd0ac-firebase-adminsdk-fbsvc-3cde402039.json}
  enabled: true   # set false to disable push notifications without breaking the app

# User Service Feign Client
user-service:
  url: ${USER_SERVICE_URL:http://localhost:7615}

# Topics consumed from task-service
kafka:
  topics:
    task-events: task-events
    project-events: project-events
    team-events: team-events
    comment-created: task.comment.created
    comment-deleted: task.comment.deleted

# Notification settings
notification:
  email:
    enabled: true
    from: noreply@tms.com
    from-name: TMS Notifications
  push:
    enabled: true
  in-app:
    enabled: true
    max-unread-per-user: 100   # cap unread notifications stored per user

# Custom Email Templates
team:
  email:
    subject: "Welcome to the Team '{teamName}'"
    body: "Hello {name},\n\nYou have been added to the team '{teamName}'.\n\nBest regards,\nNotification Service"